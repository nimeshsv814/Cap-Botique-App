apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: boutique-sts
  namespace: cap-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb-cont
          image: mongo
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: MONGO_URI
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: PORT
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: SESSION_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
              
        