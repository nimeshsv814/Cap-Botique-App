apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: boutique-sts
  namespace: cap-ns
spec:
  replicas: 2
  minReadySeconds: 10
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongodb-cont
          image: mongo
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: MONGO_URI
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: PORT
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: cap-secret
                  key: SESSION_SECRET
          volumeMounts:
          - name: nimesh-vct
            mountPath: /data/db
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: nimesh-vct
      spec:
        storageClassName: "cap-sc"
        accessModes: ["ReadWriteMany"]
        resources:
          requests:
            storage: 2Gi
              
        