apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cap-routes
  namespace: cap-ns
spec:
  parentRefs:
    - name: cap-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: boutique-svc
          port: 3015